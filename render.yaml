services:
  - type: web
    name: pulsewave-server
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: pulsewave-db
          property: connectionString

databases:
  - name: pulsewave-db
    plan: free
    databaseName: pulsewave
    user: pulsewave
